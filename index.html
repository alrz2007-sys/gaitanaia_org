<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gaitana IA | Ya volvemos</title>
    <style>
        :root {
            --bg: #0a0a0c;
            --text: #ffffff;
            --accent: #6b63ff;
            --secondary: #a1a1aa;
        }
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
        }
        .container {
            text-align: center;
            padding: 2rem;
            position: relative;
            z-index: 1;
        }
        .glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(107, 99, 255, 0.15) 0%, transparent 70%);
            filter: blur(40px);
            z-index: -1;
            animation: pulse 4s infinite alternate ease-in-out;
        }
        h1 {
            font-size: 3.5rem;
            font-weight: 800;
            margin: 0 0 1rem;
            background: linear-gradient(180deg, #fff 0%, #a1a1aa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -2px;
        }
        p {
            font-size: 1.25rem;
            color: var(--secondary);
            margin: 0;
            font-weight: 400;
        }
        .dot-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 3rem;
        }
        .dot {
            width: 6px;
            height: 6px;
            background-color: var(--accent);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes pulse {
            0% { transform: translate(-50%, -50%) scale(0.9); opacity: 0.5; }
            100% { transform: translate(-50%, -50%) scale(1.1); opacity: 0.8; }
        }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); opacity: 0.3; }
            40% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="glow"></div>
    <div class="container">
        <h1>Gaitana IA</h1>
        <p>Ya volvemos.</p>
        <div class="dot-container">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
    </div>
</body>
</html>
